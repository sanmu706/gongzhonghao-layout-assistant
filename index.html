<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>公众号排版助手</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f7f8f5;
        --panel: #ffffff;
        --panel-soft: #f1f6f0;
        --ink: #17201b;
        --muted: #66726c;
        --subtle: #8d9792;
        --line: #dce3df;
        --line-strong: #c7d2cc;
        --brand: #07945f;
        --brand-dark: #057448;
        --brand-soft: #e6f4ed;
        --coral: #e7675a;
        --coral-soft: #fff0ee;
        --amber: #d49b22;
        --blue: #3976c8;
        --shadow: 0 12px 32px rgba(25, 42, 34, 0.08);
        --radius: 8px;
        --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
        --serif: "Iowan Old Style", "Songti SC", "STSong", "SimSun", serif;
      }

      * {
        box-sizing: border-box;
      }

      html {
        height: 100%;
      }

      body {
        margin: 0;
        height: 100%;
        min-height: 100%;
        overflow: hidden;
        background:
          linear-gradient(120deg, rgba(7, 148, 95, 0.06), transparent 30%),
          radial-gradient(circle at 90% 18%, rgba(231, 103, 90, 0.08), transparent 24rem),
          var(--bg);
        color: var(--ink);
        font-family: var(--sans);
      }

      button,
      textarea,
      input,
      select {
        font: inherit;
      }

      button {
        border: 0;
        cursor: pointer;
      }

      button:focus-visible,
      textarea:focus-visible,
      input:focus-visible,
      select:focus-visible {
        outline: 3px solid rgba(7, 148, 95, 0.2);
        outline-offset: 2px;
      }

      .app {
        height: 100vh;
        min-height: 0;
        display: grid;
        grid-template-rows: 68px 1fr;
        overflow: hidden;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 20px;
        padding: 0 24px;
        border-bottom: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.84);
        backdrop-filter: blur(14px);
        position: sticky;
        top: 0;
        z-index: 5;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
        min-width: 220px;
      }

      .mark {
        width: 36px;
        height: 36px;
        border-radius: var(--radius);
        display: grid;
        place-items: center;
        background: var(--brand-soft);
        color: var(--brand);
        box-shadow: 0 8px 16px rgba(7, 148, 95, 0.12);
      }

      .mark svg {
        width: 26px;
        height: 26px;
      }

      h1 {
        margin: 0;
        font-size: 20px;
        line-height: 1.2;
        letter-spacing: 0;
      }

      .top-actions {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .ghost-btn,
      .primary-btn,
      .plain-btn {
        min-height: 40px;
        border-radius: var(--radius);
        padding: 0 14px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        font-size: 14px;
        font-weight: 650;
        white-space: nowrap;
      }

      .ghost-btn {
        color: var(--ink);
        background: #fff;
        border: 1px solid var(--line);
      }

      .plain-btn {
        color: var(--brand-dark);
        background: transparent;
        padding: 0 8px;
      }

      .primary-btn {
        color: #fff;
        background: var(--brand);
      }

      .primary-btn:hover {
        background: var(--brand-dark);
      }

      .workspace {
        display: grid;
        grid-template-columns: minmax(320px, 28vw) minmax(560px, 42vw) minmax(320px, 1fr);
        grid-template-areas: "draft settings preview";
        grid-template-rows: minmax(0, 1fr);
        height: calc(100vh - 68px);
        min-height: 0;
        overflow: hidden;
      }

      .panel {
        background: rgba(255, 255, 255, 0.72);
        border-right: 1px solid var(--line);
        min-width: 0;
        min-height: 0;
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }

      .draft-panel {
        grid-area: draft;
      }

      .draft-panel .panel-header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
      }

      .settings-panel {
        grid-area: settings;
      }

      .panel-header {
        padding: 22px 24px 14px;
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 16px;
      }

      .panel-actions {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        width: auto;
        flex: 0 0 auto;
      }

      .panel-actions .plain-btn {
        width: auto;
        min-height: 32px;
        padding: 0 8px;
        font-size: 13px;
      }

      .panel-title {
        margin: 0 0 6px;
        font-size: 18px;
        line-height: 1.2;
      }

      .hint {
        margin: 0;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.6;
      }

      .editor-area {
        padding: 0 24px 20px;
        display: flex;
        flex-direction: column;
        gap: 18px;
        flex: 1;
        min-height: 0;
        overflow: auto;
        overscroll-behavior: contain;
      }

      .draft {
        width: 100%;
        min-height: 360px;
        flex: 1;
        resize: vertical;
        border: 1px solid var(--line-strong);
        border-radius: var(--radius);
        padding: 18px;
        color: var(--ink);
        background: #fff;
        line-height: 1.75;
      }

      .row-meta {
        display: flex;
        align-items: center;
        justify-content: space-between;
        color: var(--subtle);
        font-size: 12px;
        margin-top: -12px;
      }

      .style-shell {
        display: grid;
        gap: 10px;
      }

      .style-heading-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .style-count {
        color: var(--subtle);
        font-size: 12px;
        white-space: nowrap;
      }

      .style-filters {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }

      .style-filter {
        min-height: 30px;
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 0 10px;
        background: #fff;
        color: var(--muted);
        font-size: 12px;
        font-weight: 650;
      }

      .style-filter.is-active {
        border-color: var(--brand);
        background: var(--brand-soft);
        color: var(--brand-dark);
      }

      .style-list {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
        max-height: 456px;
        overflow: auto;
        padding-right: 4px;
      }

      .style-option {
        width: 100%;
        text-align: left;
        display: grid;
        grid-template-columns: 34px 1fr 20px;
        align-items: center;
        gap: 9px;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        padding: 9px 10px;
        background: #fff;
        color: var(--ink);
      }

      .style-option:hover {
        border-color: var(--option-accent);
      }

      .style-option.is-active {
        border-color: var(--option-accent);
        background: var(--option-bg);
      }

      .style-icon {
        width: 30px;
        height: 30px;
        border-radius: var(--radius);
        display: grid;
        place-items: center;
      }

      .style-icon svg {
        width: 17px;
        height: 17px;
      }

      .style-copy strong {
        display: block;
        font-size: 13px;
        margin-bottom: 2px;
      }

      .style-copy span {
        display: block;
        color: var(--muted);
        font-size: 11px;
        line-height: 1.4;
      }

      .style-palette {
        display: flex;
        gap: 4px;
        margin-top: 6px;
      }

      .style-swatch {
        width: 16px;
        height: 5px;
        border-radius: 999px;
        border: 1px solid rgba(23, 32, 27, 0.08);
      }

      .check {
        width: 18px;
        height: 18px;
        font-size: 12px;
        border-radius: 50%;
        border: 1px solid var(--line-strong);
        display: grid;
        place-items: center;
        color: transparent;
      }

      .is-active .check {
        color: #fff;
        background: var(--option-accent);
        border-color: var(--option-accent);
      }

      .generate {
        min-height: 50px;
        font-size: 16px;
        width: 100%;
      }

      .preview-zone {
        grid-area: preview;
        min-width: 0;
        min-height: 0;
        padding: 22px 28px 28px;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        overscroll-behavior: contain;
      }

      .preview-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 16px;
      }

      .preview-head h2 {
        margin: 0;
        font-size: 18px;
      }

      .view-switch {
        display: inline-flex;
        border: 1px solid var(--line);
        background: #fff;
        border-radius: var(--radius);
        padding: 3px;
      }

      .view-switch button {
        min-height: 32px;
        border-radius: 6px;
        padding: 0 12px;
        color: var(--muted);
        background: transparent;
        font-size: 13px;
        font-weight: 650;
      }

      .view-switch button.is-active {
        background: var(--brand-soft);
        color: var(--brand-dark);
      }

      .phone-wrap {
        flex: 1 1 auto;
        min-height: 0;
        display: grid;
        place-items: center;
        overflow: hidden;
        padding: 0;
      }

      .phone {
        width: auto;
        height: min(880px, 100%);
        max-width: min(486px, 100%);
        max-height: 100%;
        aspect-ratio: 486 / 880;
        min-height: 0;
        border-radius: 42px;
        padding: 13px;
        background: linear-gradient(145deg, #eef1ed, #ffffff);
        border: 1px solid #d8dfdb;
        box-shadow: var(--shadow);
      }

      .phone-screen {
        height: 100%;
        min-height: 0;
        display: flex;
        flex-direction: column;
        border-radius: 32px;
        overflow: hidden;
        background: #fff;
        border: 1px solid #e4e8e5;
        overscroll-behavior: contain;
      }

      .phone-status {
        height: 42px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 22px;
        font-size: 13px;
        font-weight: 700;
      }

      .status-icons {
        display: flex;
        gap: 5px;
        align-items: center;
      }

      .signal {
        width: 16px;
        height: 10px;
        border-radius: 2px;
        background: linear-gradient(to right, #111 20%, transparent 20% 30%, #111 30% 50%, transparent 50% 60%, #111 60% 80%, transparent 80%);
      }

      .battery {
        width: 22px;
        height: 11px;
        border: 1.5px solid #111;
        border-radius: 3px;
        position: relative;
      }

      .battery::before {
        content: "";
        position: absolute;
        width: 12px;
        height: 5px;
        left: 3px;
        top: 2px;
        background: #111;
      }

      .wx-bar {
        height: 42px;
        padding: 0 24px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        color: #111;
      }

      .wx-dot {
        width: 4px;
        height: 4px;
        border-radius: 50%;
        background: currentColor;
        box-shadow: 7px 0 0 currentColor, 14px 0 0 currentColor;
      }

      .article {
        flex: 1 1 auto;
        min-height: 0;
        overflow: auto;
        padding: 18px 28px 44px;
        overscroll-behavior: contain;
      }

      .article h2 {
        margin: 0 0 14px;
        color: var(--title-color, #151515);
        font-size: 26px;
        line-height: 1.34;
        letter-spacing: 0;
        text-wrap: balance;
      }

      .article-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        align-items: center;
        color: #8a8f8d;
        font-size: 13px;
        line-height: 1.6;
        margin-bottom: 18px;
      }

      .tag-original {
        display: inline-flex;
        align-items: center;
        padding: 1px 6px;
        border-radius: 5px;
        background: #f1f2f1;
        color: #7b817e;
        font-size: 12px;
      }

      .lead-card {
        margin: 18px 0 22px;
        padding: 18px 18px 18px 20px;
        border-radius: var(--radius);
        background: linear-gradient(135deg, var(--lead-bg), #fff);
        color: #2a3832;
        font-size: 15px;
        line-height: 1.75;
        position: relative;
      }

      .lead-card::before {
        content: "“";
        position: absolute;
        left: 11px;
        top: 2px;
        color: var(--accent);
        font-family: Georgia, serif;
        font-size: 44px;
        line-height: 1;
        opacity: 0.85;
      }

      .lead-card p {
        margin: 0 0 0 22px;
      }

      .article p {
        margin: 14px 0;
        color: #232826;
        font-size: var(--body-size);
        line-height: var(--body-line);
        text-align: justify;
      }

      .article-section-title {
        display: flex;
        align-items: center;
        gap: 10px;
        margin: 26px 0 14px;
        color: #161d19;
        font-size: 18px;
        font-weight: 800;
        line-height: 1.45;
      }

      .section-num {
        width: 36px;
        height: 32px;
        border-radius: 7px;
        display: grid;
        place-items: center;
        color: #fff;
        background: var(--accent);
        font-size: 16px;
        font-weight: 800;
        flex: 0 0 auto;
      }

      .article-list {
        display: grid;
        gap: 13px;
        margin: 16px 0;
      }

      .article-list-item {
        display: grid;
        grid-template-columns: 22px 1fr;
        gap: 10px;
        align-items: start;
      }

      .article-list-item svg {
        width: 20px;
        height: 20px;
        color: var(--accent);
        margin-top: 3px;
      }

      .article-list-item p {
        margin: 0;
      }

      .settings {
        padding: 0 24px 24px;
        display: flex;
        flex-direction: column;
        gap: 18px;
        flex: 1;
        min-height: 0;
        overflow: auto;
        overscroll-behavior: contain;
      }

      .settings-style-shell {
        padding-bottom: 16px;
        border-bottom: 1px solid var(--line);
      }

      .settings-style-shell .style-list {
        max-height: 360px;
      }

      .field {
        display: grid;
        gap: 10px;
      }

      .field label {
        font-size: 17px;
        font-weight: 900;
        line-height: 1.25;
      }

      .setting-title {
        font-size: 15px;
        font-weight: 850;
        line-height: 1.25;
      }

      .field input,
      .field select {
        width: 100%;
        min-height: 42px;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: #fff;
        padding: 0 12px;
        color: var(--ink);
      }

      #titleLayoutSelect,
      #sectionStyleSelect,
      #leadStyleSelect,
      #emphasisStyleSelect,
      #listStyleSelect,
      #dividerStyleSelect {
        display: none;
      }

      .settings-section {
        display: grid;
        gap: 16px;
        padding: 16px 0 18px;
        border-bottom: 1px solid var(--line);
      }

      .settings-section-title {
        margin: 0;
        display: flex;
        align-items: center;
        gap: 9px;
        color: var(--ink);
        font-size: 20px;
        font-weight: 900;
        line-height: 1.25;
      }

      .settings-section-title::before {
        content: "";
        width: 5px;
        height: 20px;
        border-radius: 999px;
        background: var(--brand);
        flex: 0 0 auto;
      }

      .visual-picker {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 7px;
      }

      .visual-card {
        min-height: 98px;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: #fff;
        color: var(--ink);
        padding: 9px;
        display: grid;
        align-content: space-between;
        gap: 8px;
        text-align: left;
      }

      .visual-card:hover {
        border-color: var(--option-accent, var(--brand));
      }

      .visual-card.is-active {
        border-color: var(--option-accent, var(--brand));
        background: var(--option-bg, var(--brand-soft));
      }

      .visual-card strong {
        display: block;
        font-size: 14px;
        font-weight: 850;
        line-height: 1.35;
      }

      .visual-card-note {
        display: block;
        color: var(--muted);
        font-size: 12px;
        font-weight: 700;
        line-height: 1.35;
        margin-top: 3px;
      }

      .mini-preview {
        min-height: 45px;
        border-radius: 6px;
        background: #fafcfb;
        color: #17201b;
        padding: 8px;
        overflow: hidden;
      }

      .mini-preview-line {
        height: 7px;
        border-radius: 999px;
        background: currentColor;
        opacity: 0.18;
      }

      .mini-preview-line + .mini-preview-line {
        margin-top: 6px;
      }

      .color-field {
        display: grid;
        grid-template-columns: 46px 1fr auto;
        gap: 8px;
        align-items: center;
      }

      .color-field input[type="color"] {
        min-height: 42px;
        padding: 3px;
      }

      .color-value {
        min-height: 42px;
        display: flex;
        align-items: center;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: #fff;
        padding: 0 10px;
        color: var(--muted);
        font-size: 13px;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      }

      .mini-btn {
        min-height: 42px;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: #fff;
        color: var(--brand-dark);
        padding: 0 10px;
        font-size: 13px;
        font-weight: 650;
        white-space: nowrap;
      }

      .toggle-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
        border-bottom: 1px solid var(--line);
        padding-bottom: 14px;
      }

      .toggle-row span {
        display: block;
        color: var(--muted);
        font-size: 12px;
        margin-top: 3px;
        line-height: 1.4;
      }

      .switch {
        width: 44px;
        height: 24px;
        border-radius: 999px;
        background: #d7ded9;
        padding: 3px;
        flex: 0 0 auto;
      }

      .switch[aria-checked="true"] {
        background: var(--brand);
      }

      .switch::before {
        content: "";
        display: block;
        width: 18px;
        height: 18px;
        border-radius: 50%;
        background: #fff;
        transition: transform 160ms ease;
      }

      .switch[aria-checked="true"]::before {
        transform: translateX(20px);
      }

      .summary {
        display: grid;
        gap: 8px;
        border-radius: var(--radius);
        background: linear-gradient(145deg, var(--panel-soft), #fff);
        border: 1px solid #e3ebe6;
        padding: 16px;
      }

      .summary-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        color: var(--muted);
        font-size: 13px;
      }

      .summary-row strong {
        color: var(--ink);
        font-weight: 750;
      }

      .output-actions {
        display: grid;
        gap: 10px;
      }

      .preview-actions {
        flex: 0 0 auto;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        margin-top: 16px;
      }

      .output-actions .primary-btn,
      .output-actions .ghost-btn {
        width: 100%;
        min-height: 48px;
        font-size: 15px;
      }

      .toast {
        position: fixed;
        right: 22px;
        bottom: 22px;
        z-index: 10;
        min-width: 220px;
        max-width: calc(100vw - 44px);
        padding: 12px 14px;
        border-radius: var(--radius);
        background: #13251c;
        color: #fff;
        box-shadow: var(--shadow);
        transform: translateY(20px);
        opacity: 0;
        pointer-events: none;
        transition: opacity 180ms ease, transform 180ms ease;
        font-size: 14px;
      }

      .toast.show {
        opacity: 1;
        transform: translateY(0);
      }

      .desktop-preview .phone {
        width: min(760px, 100%);
        border-radius: 12px;
      }

      .desktop-preview .phone-screen {
        border-radius: 8px;
      }

      .desktop-preview .phone-status,
      .desktop-preview .wx-bar {
        display: none;
      }

      .desktop-preview .article {
        max-width: 680px;
        margin: 0 auto;
        padding: 46px 52px 64px;
      }

      @media (max-width: 1120px) {
        .workspace {
          grid-template-columns: 360px 1fr;
          grid-template-rows: minmax(0, 1fr) minmax(0, 1fr);
          grid-template-areas:
            "draft settings"
            "preview preview";
        }

        .settings-panel {
          border-right: 0;
        }

        .preview-zone {
          border-top: 1px solid var(--line);
        }

        .settings {
          display: grid;
          grid-template-columns: repeat(2, minmax(240px, 1fr));
          align-items: start;
        }

        .settings-style-shell {
          grid-column: 1 / -1;
        }

        .visual-picker {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .style-list {
          grid-template-columns: 1fr;
        }
      }

      @media (max-width: 760px) {
        html,
        body {
          height: auto;
          min-height: 100%;
          overflow: auto;
        }

        .app {
          height: auto;
          min-height: 100vh;
          grid-template-rows: auto 1fr;
          overflow: visible;
        }

        .topbar {
          position: static;
          padding: 14px 16px;
          align-items: flex-start;
          flex-direction: column;
        }

        .top-actions {
          width: 100%;
          display: grid;
          grid-template-columns: 1fr 1fr;
        }

        .workspace {
          display: grid;
          grid-template-columns: 1fr;
          grid-template-rows: auto;

在信息爆炸的时代，专注力成为了**稀缺资源**。
我们每天都被各种通知、消息和社交媒体推着走，注意力被不断切碎，时间也在不知不觉中溜走。

**真正的高效**，不是做更多的事，而是把注意力集中在最重要的事情上。

如何提升专注力？

1. 明确目标，减少选择
把每天最重要的 1-3 件事写下来，优先完成它们。

2. 创造专注环境
关闭不必要的通知，整理桌面，营造一个安静、整洁的空间。

3. 使用番茄工作法
25 分钟专注工作，5 分钟休息，大脑更容易保持高效。

4. 定期复盘与调整
每周回顾一次自己的时间流向，找到最容易分心的环节。

专注不是天赋，而是一种可以被训练的能力。`;

      function escapeHtml(value) {
        return value
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function countChineseWords(text) {
        return stripInlineSyntax(text).replace(/\s/g, "").length;
      }

      function stripInlineSyntax(text) {
        return text
          .replace(/\[\[em:[a-zA-Z0-9-]+\]\]([\s\S]*?)\[\[\/em\]\]/g, "$1")
          .replace(/\[\[(section|quote|divider|list):[a-zA-Z0-9-]+\]\]/g, "")
          .replace(/\[\[\/list\]\]/g, "")
          .replace(/\*\*([^*]+)\*\*/g, "$1");
      }

      function clearDraftStyles(text) {
        return text
          .replace(/(^|\n+)\[\[divider:[a-zA-Z0-9-]+\]\][^\n]*(?=\n|$)/g, "$1")
          .replace(/\[\[em:[a-zA-Z0-9-]+\]\]([\s\S]*?)\[\[\/em\]\]/g, "$1")
          .replace(/\[\[section:[a-zA-Z0-9-]+\]\]/g, "")
          .replace(/\[\[quote:[a-zA-Z0-9-]+\]\]/g, "")
          .replace(/\[\[list:[a-zA-Z0-9-]+\]\]\n?/g, "")
          .replace(/\n?\[\[\/list\]\]/g, "")
          .replace(/\*\*([^*]+)\*\*/g, "$1")
          .replace(/[ \t]+\n/g, "\n")
          .replace(/\n{3,}/g, "\n\n")
          .trim();
      }

      function parseDraft(text) {
        const blocks = text
          .split(/\n{2,}/)
          .map((block) => block.trim())
          .filter(Boolean);

        const title = blocks[0] || "未命名文章";
        const bodyBlocks = blocks.slice(1);
        const nodes = [];
        let listRunId = 0;
        let activeAutoListGroup = "";

        bodyBlocks.forEach((block) => {
          const sectionMatch = block.match(/^\[\[section:([a-zA-Z0-9-]+)\]\]([\s\S]+)$/);
          if (sectionMatch) {
            activeAutoListGroup = "";
            nodes.push({ type: "heading", text: sectionMatch[2].trim().replace(/[：:]$/, ""), style: sectionMatch[1] });
            return;
          }

          const quoteMatch = block.match(/^\[\[quote:([a-zA-Z0-9-]+)\]\]([\s\S]+)$/);
          if (quoteMatch) {
            activeAutoListGroup = "";
            nodes.push({ type: "quote", text: quoteMatch[2].trim(), style: quoteMatch[1] });
            return;
          }

          const dividerMatch = block.match(/^\[\[divider:([a-zA-Z0-9-]+)\]\](.*)$/);
          if (dividerMatch) {
            activeAutoListGroup = "";
            nodes.push({ type: "divider", text: (dividerMatch[2] || "").trim(), style: dividerMatch[1] });
            return;
          }

          const listMatch = block.match(/^\[\[list:([a-zA-Z0-9-]+)\]\]\n?([\s\S]*?)\n?\[\[\/list\]\]$/);
          if (listMatch) {
            activeAutoListGroup = "";
            listRunId += 1;
            const listGroup = `list-${listRunId}`;
            listMatch[2]
              .split("\n")
              .map((line) => line.trim())
              .filter(Boolean)
              .forEach((line) => {
                nodes.push({ type: "list", text: line.replace(/^(\d+)[.、]\s*/, ""), style: listMatch[1], group: listGroup });
              });
            return;
          }

          const lines = block.split("\n").map((line) => line.trim()).filter(Boolean);

          let localListGroup = "";
          lines.forEach((line) => {
            const match = line.match(/^(\d+)[.、]\s*(.+)$/);
            if (match) {
              if (!localListGroup) {
                if (!activeAutoListGroup) {
                  listRunId += 1;
                  activeAutoListGroup = `list-${listRunId}`;
                }
                localListGroup = activeAutoListGroup;
              }
              nodes.push({ type: "list", text: match[2], group: localListGroup });
            } else {
              localListGroup = "";
              nodes.push({ type: "paragraph", text: line });
            }
          });
        });

        return { title, nodes };
      }

      function styleAttr(rules) {
        return Object.entries(rules)
          .filter(([, value]) => value !== undefined && value !== null && value !== "")
          .map(([key, value]) => `${key}:${value}`)
          .join(";");
      }

          "list-bullet": `<div style="display:grid;gap:5px;"><span style="color:${accent};">• <b style="color:#17201b;">第一项</b></span><span style="color:${accent};">• <b style="color:#17201b;">第二项</b></span></div>`,

          "divider-label": `<div style="display:flex;align-items:center;gap:8px;color:${accent};"><span style="height:1px;background:#dce3df;flex:1;"></span><span style="display:inline-flex;gap:5px;align-items:center;"><i style="width:5px;height:5px;border-radius:50%;background:${accent};display:block;"></i><i style="width:5px;height:5px;border-radius:50%;background:${accent};display:block;"></i></span><span style="height:1px;background:#dce3df;flex:1;"></span></div>`,
          "divider-double": `<div style="display:grid;gap:4px;margin-top:14px;"><span style="height:1px;background:${accent};opacity:.7;"></span><span style="height:1px;background:#dce3df;"></span></div>`,

        return samples[type] || line;
      }

      function renderComponentPickers() {
        const style = styles[state.style];
        componentPickers.forEach((picker) => {
          const host = els[picker.hostKey];
          if (!host) return;
          host.innerHTML = picker.options.map((option) => `
            <button class="visual-card ${state[picker.stateKey] === option.value ? "is-active" : ""}" type="button" data-component-picker="${picker.stateKey}" data-value="${option.value}" style="--option-accent:${style.accent};--option-bg:${style.leadBg};">
              <div class="mini-preview">${previewMarkup(option.preview, style)}</div>
              <strong>${option.label}<span class="visual-card-note">${option.note}</span></strong>
            </button>
          `).join("");
        });
      }

      function renderEmphasis(text, style, emphasisStyle = state.emphasisStyle) {
        const safeText = escapeHtml(text);
        const base = {
          color: style.accent,
          "font-weight": "800"
        };

        if (emphasisStyle === "marker") {
          return `<span style="${styleAttr({ color: "#17201b", "font-weight": "800", background: style.leadBg, padding: "0 3px", "border-radius": "3px" })}">${safeText}</span>`;
        }

        if (emphasisStyle === "underline") {
          return `<span style="${styleAttr({ color: "inherit", "font-weight": "800", "border-bottom": `3px solid ${style.accent}`, "padding-bottom": "1px" })}">${safeText}</span>`;
        }

        if (emphasisStyle === "tag") {
          return `<span style="${styleAttr({ display: "inline-block", color: style.accent, background: style.leadBg, "border-radius": "999px", padding: "0 7px", "font-size": "0.92em", "font-weight": "800", "line-height": "1.65" })}">${safeText}</span>`;
        }

        if (emphasisStyle === "box") {
          return `<span style="${styleAttr({ display: "inline-block", color: style.accent, background: "#fff", border: `1px solid ${style.accent}`, "border-radius": "5px", padding: "0 6px", "font-size": "0.94em", "font-weight": "800", "line-height": "1.65" })}">${safeText}</span>`;
        }

        if (emphasisStyle === "wave") {
          return `<span style="${styleAttr({ color: style.accent, "font-weight": "800", "border-bottom": `2px dotted ${style.accent}`, "padding-bottom": "1px" })}">${safeText}</span>`;
        }

        return `<strong style="${styleAttr(base)}">${safeText}</strong>`;
      }

      function renderInline(text, style) {
        return text
          .split(/(\[\[em:[a-zA-Z0-9-]+\]\][\s\S]*?\[\[\/em\]\]|\*\*[^*]+\*\*)/g)
          .filter((part) => part !== "")
          .map((part) => {
            const markerMatch = part.match(/^\[\[em:([a-zA-Z0-9-]+)\]\]([\s\S]*?)\[\[\/em\]\]$/);
            if (markerMatch) {
              return renderEmphasis(markerMatch[2], style, markerMatch[1]);
            }
            if (part.startsWith("**") && part.endsWith("**")) {
              return renderEmphasis(part.slice(2, -2), style);
            }
            return escapeHtml(part);
          })
          .join("");
      }

      function renderTitle(title, style) {
        const titleColor = getTitleColor(style);
        const base = {
          margin: "0 0 14px",
          color: titleColor,
          "font-size": `${state.titleSize}px`,
          "line-height": "1.34",
          "letter-spacing": "0",
          "font-weight": "800",
          "text-wrap": "balance"
        };

        if (state.titleLayout === "center") {
          return `<h2 style="${styleAttr({ ...base, "text-align": "center", margin: "0 0 12px" })}">${escapeHtml(title)}</h2>`;
        }

        if (state.titleLayout === "underline") {
          return `<h2 style="${styleAttr({ ...base, "padding-bottom": "12px", "border-bottom": `1px solid ${style.accent}`, margin: "0 0 16px" })}">${escapeHtml(title)}</h2>`;
        }

          return `<section style="${frameStyle}"><h2 style="${styleAttr({ ...base, margin: "0" })}">${escapeHtml(title)}</h2></section>`;
        }

        if (state.titleLayout === "badge") {
          return `<section style="${styleAttr({ margin: "0 0 16px" })}"><span style="${styleAttr({ display: "inline-flex", "align-items": "center", background: style.accent, color: "#fff", "border-radius": "999px", padding: "3px 9px", "font-size": "12px", "font-weight": "800", "margin-bottom": "10px" })}">原创精选</span><h2 style="${styleAttr({ ...base, margin: "0" })}">${escapeHtml(title)}</h2></section>`;
        }

        if (state.titleLayout === "magazine") {
          return `<section style="${styleAttr({ margin: "0 0 18px" })}"><div style="${styleAttr({ height: "1px", background: style.accent, opacity: "0.55", margin: "0 0 14px" })}"></div><h2 style="${styleAttr({ ...base, margin: "0", "text-align": "center" })}">${escapeHtml(title)}</h2><div style="${styleAttr({ height: "1px", background: style.accent, opacity: "0.55", margin: "14px 0 0" })}"></div></section>`;
        }

        return `<h2 style="${styleAttr(base)}">${escapeHtml(title)}</h2>`;
      }

      function renderMeta(author, date, reads) {
        const justify = state.titleLayout === "center" ? "center" : "flex-start";
        return `<div class="article-meta" style="${styleAttr({ display: "flex", "flex-wrap": "wrap", gap: "8px", "align-items": "center", "justify-content": justify, color: "#8a8f8d", "font-size": "13px", "line-height": "1.6", "margin-bottom": "18px" })}"><span style="${styleAttr({ display: "inline-flex", "align-items": "center", padding: "1px 6px", "border-radius": "5px", background: "#f1f2f1", color: "#7b817e", "font-size": "12px" })}">原创</span><span>${escapeHtml(author)}</span><span>${date}</span><span>${reads}人读过</span></div>`;
      }

      function renderLead(text, style, leadStyle = state.leadStyle) {

        }

        if (leadStyle === "outline") {
          return `<section style="${styleAttr({ margin: "18px 0 22px", padding: "16px 18px", "border-radius": "8px", background: "#fff", border: `1px solid ${style.accent}` })}"><p style="${paragraph}">${safeText}</p></section>`;
        }

        if (leadStyle === "plain") {
          return `<blockquote style="${styleAttr({ margin: "18px 0 22px", padding: "13px 0", "border-top": `1px solid ${style.accent}`, "border-bottom": `1px solid ${style.accent}` })}"><p style="${styleAttr({ margin: "0", color: "#313b36", "font-size": "15px", "line-height": "1.82", "text-align": "left", "font-style": "italic" })}">${safeText}</p></blockquote>`;

        }

        if (leadStyle === "summary") {

        return `<section style="${styleAttr({ margin: "18px 0 22px", padding: "17px 18px", "border-radius": "8px", background: `linear-gradient(135deg, ${style.leadBg}, #fff)`, color: "#2a3832" })}"><div style="${styleAttr({ display: "grid", "grid-template-columns": "24px 1fr", gap: "8px", "align-items": "start" })}"><span style="${styleAttr({ color: style.accent, "font-family": "Georgia, serif", "font-size": "34px", "line-height": "1" })}">“</span><p style="${paragraph}">${safeText}</p></div></section>`;
      }

      function renderSectionTitle(text, index, style, sectionStyle = state.sectionStyle) {
        const safeText = escapeHtml(text);
        const titleBase = {

        if (sectionStyle === "ribbon") {

        }

        if (sectionStyle === "frameSoft") {
          return `<h3 style="${styleAttr({ ...titleBase, margin: "28px 0 18px", padding: "12px 8px", "border-top": "1px solid #9a9f9c", "border-bottom": "1px solid #9a9f9c", "text-align": "center", color: "#343a37", "font-size": "18px", "font-weight": "900" })}">“${safeText}”</h3>`;
        }

        if (sectionStyle === "redbarCompact") {

      function renderDivider(style, label = "继续阅读", dividerStyle = state.dividerStyle) {

        }

      function renderListStart(listStyle = state.listStyle) {
        const base = { display: "grid", gap: "13px", margin: "16px 0" };

        if (listStyle === "timeline") {
          return `<div style="${styleAttr({ ...base, gap: "0" })}">`;

      function renderListItem(text, index, style, fontSize, listStyle = state.listStyle) {

        };

        }

        if (listStyle === "bullet") {
          return `<div style="${styleAttr({ display: "grid", "grid-template-columns": "18px 1fr", gap: "9px", "align-items": "start" })}"><span style="${styleAttr({ width: "7px", height: "7px", "border-radius": "50%", background: style.accent, "margin-top": "10px", "justify-self": "center" })}"></span><p style="${styleAttr(paragraph)}">${content}</p></div>`;
        }

        if (listStyle === "plain") {
          return `<p style="${styleAttr({ ...paragraph, margin: "0" })}"><strong style="${styleAttr({ color: style.accent, "margin-right": "6px" })}">${index}.</strong>${content}</p>`;
        }

        return `<div style="${styleAttr({ display: "grid", "grid-template-columns": "22px 1fr", gap: "10px", "align-items": "start" })}"><svg viewBox="0 0 24 24" fill="none" aria-hidden="true" style="${styleAttr({ width: "20px", height: "20px", color: style.accent, "margin-top": "3px" })}"><circle cx="12" cy="12" r="8.5" stroke="currentColor" stroke-width="1.8"/><path d="m8.5 12 2.3 2.4 4.8-5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg><p style="${styleAttr(paragraph)}">${content}</p></div>`;
      }

      function buildArticle(parsed) {
        const style = styles[state.style];
        const words = countChineseWords(els.draft.value);
        const fontSize = Number(els.font.value || style.bodySize);
        const bodyFont = getBodyFont();
        const metaDate = new Intl.DateTimeFormat("zh-CN", {
          year: "numeric",
          month: "2-digit",
          day: "2-digit",
          hour: "2-digit",
          minute: "2-digit"
        }).format(new Date());

        let sectionIndex = 0;
        let listOpen = false;
        let listIndex = 0;
        let currentListStyle = state.listStyle;
        let currentListGroup = "";
        const listCounters = {};
        const parts = [];
        const markdown = [`# ${parsed.title}`, ""];

        function closeList() {
          if (listOpen) {
            parts.push("</div>");
            listOpen = false;
          }
        }

        parts.push(renderTitle(parsed.title, style));

        const firstParagraph = parsed.nodes.find((node) => node.type === "paragraph");
        if (state.showLead && firstParagraph) {
          parts.push(renderLead(firstParagraph.text, style));
        }

        parsed.nodes.forEach((node) => {
          if (node.type !== "list") closeList();

          if (node.type === "heading") {
            sectionIndex += 1;
            if (state.showDividers) {
              parts.push(renderDivider(style, sectionIndex === 1 ? "正文开始" : "继续阅读"));
            }
            parts.push(renderSectionTitle(node.text, sectionIndex, style, node.style || state.sectionStyle));
            markdown.push(`## ${node.text}`, "");
          }

          if (node.type === "quote") {
            parts.push(renderLead(node.text, style, node.style || state.leadStyle));
            markdown.push(`> ${node.text}`, "");
          }

          if (node.type === "divider") {
            parts.push(renderDivider(style, node.text || "继续阅读", node.style || state.dividerStyle));
          }

          if (node.type === "paragraph") {
            parts.push(`<p style="${styleAttr({ margin: "14px 0", color: "#232826", "font-size": `${fontSize}px`, "line-height": style.bodyLine, "font-family": bodyFont, "text-align": "justify" })}">${renderInline(node.text, style)}</p>`);
            markdown.push(node.text, "");
          }

          if (node.type === "list") {
            const nodeListStyle = node.style || state.listStyle;
            const nodeListGroup = node.group || "default";
            const listKey = `${nodeListStyle}:${nodeListGroup}`;
            if (!listOpen || currentListStyle !== nodeListStyle || currentListGroup !== nodeListGroup) {
              closeList();
              parts.push(renderListStart(nodeListStyle));
              listOpen = true;
              listIndex = listCounters[listKey] || 0;
              currentListStyle = nodeListStyle;
              currentListGroup = nodeListGroup;
            }
            listIndex += 1;
            listCounters[listKey] = listIndex;
            parts.push(renderListItem(node.text, listIndex, style, fontSize, nodeListStyle));
            markdown.push(`- ${node.text}`);
          }
        });
        closeList();

        if (state.showCopyright) {
          parts.push(`<p style="margin-top:28px;color:#777;font-size:13px;">版权说明：转载请联系作者授权，感谢尊重原创内容。</p>`);
          markdown.push("", "版权说明：转载请联系作者授权，感谢尊重原创内容。");
        }

        const html = `<section style="--accent:${style.accent};--lead-bg:${style.leadBg};--title-color:${getTitleColor(style)};--body-size:${fontSize}px;--body-line:${style.bodyLine};--body-font:${bodyFont};font-family:${bodyFont};color:#232826;">${parts.join("")}</section>`;
        const plainText = [parsed.title, "", ...parsed.nodes.map((node) => stripInlineSyntax(node.text)), state.showCopyright ? "版权说明：转载请联系作者授权，感谢尊重原创内容。" : ""].filter(Boolean).join("\n");

        return { html, plainText, markdown: markdown.join("\n"), sectionCount: sectionIndex };
      }

      function renderStyleFilters() {
        els.styleFilters.innerHTML = styleGroups.map((group) => `
          <button class="style-filter ${group.key === state.styleGroup ? "is-active" : ""}" type="button" data-style-group="${group.key}">
            ${group.name}
          </button>
        `).join("");
      }

      function renderStyles() {
        const visibleStyles = Object.entries(styles).filter(([, item]) => state.styleGroup === "all" || item.group === state.styleGroup);
        els.styleCount.textContent = `${visibleStyles.length} / ${Object.keys(styles).length} 个风格`;
        els.styleList.innerHTML = visibleStyles.map(([key, item]) => `
          <button class="style-option ${key === state.style ? "is-active" : ""}" type="button" data-style="${key}" style="--option-accent:${item.accent};--option-bg:${item.iconBg};">
            <span class="style-icon" style="background:${item.iconBg};color:${item.iconColor};">${icons[item.icon]}</span>
            <span class="style-copy">
              <strong>${item.name}</strong>
              <span>${item.desc}</span>
              <span class="style-palette" aria-hidden="true">
                <i class="style-swatch" style="background:${item.accent};"></i>
                <i class="style-swatch" style="background:${item.leadBg};"></i>
                <i class="style-swatch" style="background:${item.titleColor};"></i>
              </span>
            </span>
            <span class="check">✓</span>
          </button>
        `).join("");
      }

      function syncControlsFromState() {
        els.font.value = String(styles[state.style].bodySize);
        els.bodyFont.value = state.bodyFont;
        els.titleLayout.value = state.titleLayout;
        els.sectionStyle.value = state.sectionStyle;
        els.titleSize.value = String(state.titleSize);
        els.leadStyle.value = state.leadStyle;
        els.emphasisStyle.value = state.emphasisStyle;
        els.listStyle.value = state.listStyle;
        els.dividerStyle.value = state.dividerStyle;
        setSwitch(els.dividerToggle, state.showDividers);
        setSwitch(els.copyrightToggle, state.showCopyright);
      }

      function setComponentSelection(stateKey, value) {
        const picker = componentPickers.find((item) => item.stateKey === stateKey);
        if (!picker) return;
        state[stateKey] = value;
        if (els[picker.selectKey]) {
          els[picker.selectKey].value = value;
        }
        renderComponentPickers();
        update();
      }

      function restoreDraftScroll(scrollTop, scrollLeft) {
        els.draft.scrollTop = scrollTop;
        els.draft.scrollLeft = scrollLeft;
        const restoreLater = window.requestAnimationFrame || ((callback) => window.setTimeout(callback, 0));
        restoreLater(() => {
          els.draft.scrollTop = scrollTop;
          els.draft.scrollLeft = scrollLeft;
        });
      }

      function previewAnchorFromText(text) {
        const lines = stripInlineSyntax(String(text || ""))
          .split(/\n+/)
          .map((line) => line.trim().replace(/^(\d+)[.、]\s*/, "").replace(/[：:]$/, ""))
          .filter(Boolean);
        return lines[0] || "";
      }

      function normalizePreviewAnchor(text) {
        return String(text || "").replace(/\s+/g, "");
      }

      function countPreviewAnchorOccurrences(text, anchorText) {
        const anchor = normalizePreviewAnchor(anchorText).slice(0, 32);
        if (!anchor) return 0;
        const haystack = normalizePreviewAnchor(stripInlineSyntax(String(text || "")));
        let count = 0;
        let index = haystack.indexOf(anchor);
        while (index !== -1) {
          count += 1;
          index = haystack.indexOf(anchor, index + anchor.length);
        }
        return count;
      }

      function findPreviewAnchorElement(anchorText, occurrence = 0) {
        const anchor = normalizePreviewAnchor(anchorText).slice(0, 32);
        if (!anchor) return null;

        const preferredSelectors = "h2,h3,p,blockquote,li";
        const fallbackSelectors = "span,strong,section,div";
        const findMatches = (selectors) => [...els.preview.querySelectorAll(selectors)]
          .filter((element) => element !== els.preview && element !== els.preview.firstElementChild)
          .filter((element) => normalizePreviewAnchor(element.textContent).includes(anchor));

        const matches = findMatches(preferredSelectors);
        const fallbackMatches = matches.length ? matches : findMatches(fallbackSelectors);
        return fallbackMatches[Math.min(Math.max(0, occurrence), fallbackMatches.length - 1)] || null;
      }

      function scrollPreviewToAnchor(anchorText, occurrence = 0) {
        const target = findPreviewAnchorElement(anchorText, occurrence);
        if (!target || !els.preview) return;

        const run = () => {
          const scroller = els.preview;
          const zoneRect = scroller.getBoundingClientRect();
          const targetRect = target.getBoundingClientRect();
          const top = Math.max(0, scroller.scrollTop + targetRect.top - zoneRect.top - 28);
          if (typeof scroller.scrollTo === "function") {
            scroller.scrollTo({ top, behavior: "smooth" });
          } else {
            scroller.scrollTop = top;
          }
        };
        const schedule = window.requestAnimationFrame || ((callback) => window.setTimeout(callback, 0));
        schedule(run);
      }

      function nearbyPreviewAnchor(before, after) {
        const next = after.split(/\n+/).map(previewAnchorFromText).find(Boolean);
        if (next) return next;
        return before.split(/\n+/).reverse().map(previewAnchorFromText).find(Boolean) || "";
      }

      function replaceDraftSelection(replacement, start, end, previewAnchorText = "") {
        const scrollTop = els.draft.scrollTop;
        const scrollLeft = els.draft.scrollLeft;
        const before = els.draft.value.slice(0, start);
        const after = els.draft.value.slice(end);
        els.draft.value = `${before}${replacement}${after}`;
        const cursor = start + replacement.length;
        try {
          els.draft.focus({ preventScroll: true });
        } catch (error) {
          els.draft.focus();
        }
        els.draft.setSelectionRange(cursor, cursor);
        update();
        restoreDraftScroll(scrollTop, scrollLeft);
        scrollPreviewToAnchor(previewAnchorText, countPreviewAnchorOccurrences(before, previewAnchorText));
      }

      function firstBodyInsertPosition(text) {
        const match = text.match(/\n{2,}/);
        return match ? match.index + match[0].length : text.length;
      }

      function insertDividerAtCursor(value) {
        let start = els.draft.selectionStart;
        let end = els.draft.selectionEnd;
        const text = els.draft.value;

        if (typeof start !== "number" || typeof end !== "number") {
          start = firstBodyInsertPosition(text);
          end = start;
        }

        if (start === 0 && end === 0 && text.trim()) {
          start = firstBodyInsertPosition(text);
          end = start;
        }

        const before = text.slice(0, start);
        const after = text.slice(end);
        const beforeGap = !before || before.endsWith("\n\n") ? "" : before.endsWith("\n") ? "\n" : "\n\n";
        const afterGap = !after || after.startsWith("\n\n") ? "" : after.startsWith("\n") ? "\n" : "\n\n";
        const replacement = `${beforeGap}[[divider:${value}]]${afterGap}`;
        const previewAnchor = nearbyPreviewAnchor(before, after);

        state.dividerStyle = value;
        els.dividerStyle.value = value;
        replaceDraftSelection(replacement, start, end, previewAnchor);
        toast("已插入分割线");
        return true;
      }

      function applyComponentToSelection(stateKey, value) {
        const start = els.draft.selectionStart;
        const end = els.draft.selectionEnd;
        if (stateKey === "dividerStyle" && (typeof start !== "number" || typeof end !== "number" || end <= start)) {
          return insertDividerAtCursor(value);
        }

        if (typeof start !== "number" || typeof end !== "number" || end <= start) return false;

        const selected = els.draft.value.slice(start, end);
        const trimmed = selected.trim();
        if (!trimmed) return false;

        let replacement = "";

        if (stateKey === "sectionStyle") {
          replacement = `\n\n[[section:${value}]]${trimmed.replace(/\s+/g, " ")}\n\n`;
        } else if (stateKey === "leadStyle") {
          replacement = `\n\n[[quote:${value}]]${trimmed}\n\n`;
        } else if (stateKey === "emphasisStyle") {
          let emphasisStart = start;
          let emphasisEnd = end;
          let emphasisText = selected;
          if (els.draft.value.slice(start - 2, start) === "**" && els.draft.value.slice(end, end + 2) === "**") {
            emphasisStart = start - 2;
            emphasisEnd = end + 2;
          } else if (trimmed.startsWith("**") && trimmed.endsWith("**")) {
            emphasisText = trimmed.slice(2, -2);
          }
          replacement = `[[em:${value}]]${emphasisText}[[/em]]`;
          replaceDraftSelection(replacement, emphasisStart, emphasisEnd, previewAnchorFromText(emphasisText));
          toast("已应用到选中文本");
          return true;
        } else if (stateKey === "listStyle") {
          state.listStyle = value;
          els.listStyle.value = value;
          const items = trimmed
            .split("\n")
            .map((line) => line.trim().replace(/^(\d+)[.、]\s*/, ""))
            .filter(Boolean);
          if (!items.length) return false;
          replacement = `\n\n[[list:${value}]]\n${items.join("\n")}\n[[/list]]\n\n`;
          replaceDraftSelection(replacement, start, end, items[0]);
          toast("已应用到选中文本");
          return true;
        } else if (stateKey === "dividerStyle") {
          state.dividerStyle = value;
          els.dividerStyle.value = value;
          replacement = `\n\n[[divider:${value}]]\n\n${trimmed}`;
        } else {
          return false;
        }

        replaceDraftSelection(replacement, start, end, previewAnchorFromText(trimmed));
        toast("已应用到选中文本");
        return true;
      }

      function update() {
        const parsed = parseDraft(els.draft.value);
        const output = buildArticle(parsed);
        const words = countChineseWords(els.draft.value);
        const paragraphs = parsed.nodes.filter((node) => node.type === "paragraph" || node.type === "list").length;
        const style = styles[state.style];
        const activeTitleColor = getTitleColor(style);

        state.html = output.html;
        state.text = output.plainText;
        state.markdown = output.markdown;
        els.preview.innerHTML = output.html;
        els.preview.style.setProperty("--accent", style.accent);
        els.preview.style.setProperty("--lead-bg", style.leadBg);
        els.preview.style.setProperty("--title-color", activeTitleColor);
        els.preview.style.setProperty("--body-size", `${Number(els.font.value || style.bodySize)}px`);
        els.preview.style.setProperty("--body-line", style.bodyLine);
        els.preview.style.setProperty("--body-font", getBodyFont());
        els.titleColor.value = activeTitleColor;
        els.titleColorValue.textContent = activeTitleColor.toUpperCase();
        els.wordCount.textContent = `${words} 字`;
        els.summaryStyle.textContent = style.name;
        els.summaryWords.textContent = words;
        els.summaryParagraphs.textContent = paragraphs;
        els.summaryHeadings.textContent = output.sectionCount;
        els.summaryRead.textContent = `${Math.max(1, Math.ceil(words / 450))} 分钟`;
      }

      async function copyValue(value, label, mimeType = "text/plain") {
        const fallbackCopy = () => {
          const temp = document.createElement("textarea");
          temp.value = value;
          temp.setAttribute("readonly", "");
          temp.style.position = "fixed";
          temp.style.left = "-9999px";
          temp.style.top = "0";
          document.body.appendChild(temp);
          temp.select();
          const ok = document.execCommand("copy");
          temp.remove();
          return ok;
        };

        try {
          if (mimeType === "text/html" && navigator.clipboard && window.ClipboardItem) {
            await navigator.clipboard.write([
              new ClipboardItem({
                "text/html": new Blob([value], { type: "text/html" }),
                "text/plain": new Blob([state.text], { type: "text/plain" })
              })
            ]);
          } else if (navigator.clipboard) {
            await navigator.clipboard.writeText(value);
          } else {
            if (!fallbackCopy()) throw new Error("fallback copy failed");
          }
          toast(`${label}已复制`);
        } catch (error) {
          if (fallbackCopy()) {
            toast(`${label}已复制`);
          } else {
            toast("复制失败，请手动选择内容");
          }
        }
      }

      function toast(message) {
        els.toast.textContent = message;
        els.toast.classList.add("show");
        window.clearTimeout(toast.timer);
        toast.timer = window.setTimeout(() => els.toast.classList.remove("show"), 1800);
      }

      function downloadHtml() {
        const documentHtml = `<!doctype html><html lang="zh-CN"><meta charset="utf-8"><title>公众号排版导出</title><body>${state.html}</body></html>`;
        const blob = new Blob([documentHtml], { type: "text/html;charset=utf-8" });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = "gongzhonghao-layout.html";
        link.click();
        URL.revokeObjectURL(link.href);
        toast("HTML 文件已导出");
      }

      function setSwitch(button, value) {
        button.setAttribute("aria-checked", String(value));
      }

      function resetStyleSettings() {
        Object.assign(state, defaultStyleState);
        syncControlsFromState();
        renderStyleFilters();
        renderStyles();
        renderComponentPickers();
      }

      els.draft.value = sampleDraft;
      syncControlsFromState();
      renderStyleFilters();
      renderStyles();
      renderComponentPickers();
      update();

      els.styleFilters.addEventListener("click", (event) => {
        const button = event.target.closest("[data-style-group]");
        if (!button) return;
        state.styleGroup = button.dataset.styleGroup;
        renderStyleFilters();
        renderStyles();
      });

      els.styleList.addEventListener("click", (event) => {
        const button = event.target.closest("[data-style]");
        if (!button) return;
        state.style = button.dataset.style;
        renderStyles();
        renderComponentPickers();
        update();
      });

      document.querySelector(".settings").addEventListener("click", (event) => {
        const button = event.target.closest("[data-component-picker]");
        if (!button) return;
        if (applyComponentToSelection(button.dataset.componentPicker, button.dataset.value)) {
          renderComponentPickers();
          return;
        }
        setComponentSelection(button.dataset.componentPicker, button.dataset.value);
      });

      els.draft.addEventListener("input", update);
      els.font.addEventListener("change", update);
      els.bodyFont.addEventListener("change", () => {
        state.bodyFont = els.bodyFont.value;
        update();
      });
      els.titleLayout.addEventListener("change", () => {
        state.titleLayout = els.titleLayout.value;
        update();
      });
      els.sectionStyle.addEventListener("change", () => {
        state.sectionStyle = els.sectionStyle.value;
        update();
      });
      els.titleSize.addEventListener("change", () => {
        state.titleSize = Number(els.titleSize.value || 26);
        update();
      });
      els.titleColor.addEventListener("input", () => {
        state.titleColor = els.titleColor.value;
        update();
      });
      els.resetTitleColor.addEventListener("click", () => {
        state.titleColor = "";
        update();
        toast("标题颜色已跟随当前风格");
      });
      els.leadStyle.addEventListener("change", () => {
        state.leadStyle = els.leadStyle.value;
        update();
      });
      els.emphasisStyle.addEventListener("change", () => {
        state.emphasisStyle = els.emphasisStyle.value;
        update();
      });
      els.listStyle.addEventListener("change", () => {
        state.listStyle = els.listStyle.value;
        update();
      });
      els.dividerStyle.addEventListener("change", () => {
        state.dividerStyle = els.dividerStyle.value;
        update();
      });
      document.querySelector("#generateBtn").addEventListener("click", () => {
        update();
        toast("排版已更新");
      });
      document.querySelector("#clearBtn").addEventListener("click", () => {
        els.draft.value = "";
        update();
        toast("草稿已清空");
      });
      document.querySelector("#clearStylesBtn").addEventListener("click", () => {
        els.draft.value = clearDraftStyles(els.draft.value);
        resetStyleSettings();
        update();
        toast("样式已清空，正文已保留");
      });
      document.querySelector("#sampleBtn").addEventListener("click", () => {
        els.draft.value = sampleDraft;
        update();
        toast("已载入示例草稿");
      });
      document.querySelector("#copyHtmlBtn").addEventListener("click", () => copyValue(state.html, "HTML", "text/html"));
      document.querySelector("#copyTextBtn").addEventListener("click", () => copyValue(state.text, "纯文本"));
      document.querySelector("#copyMarkdownBtn").addEventListener("click", () => copyValue(state.markdown, "Markdown"));
      document.querySelector("#downloadBtn").addEventListener("click", downloadHtml);
      els.dividerToggle.addEventListener("click", () => {
        state.showDividers = !state.showDividers;
        setSwitch(els.dividerToggle, state.showDividers);
        update();
      });
      els.copyrightToggle.addEventListener("click", () => {
        state.showCopyright = !state.showCopyright;
        setSwitch(els.copyrightToggle, state.showCopyright);
        update();
      });
      document.querySelector(".view-switch").addEventListener("click", (event) => {
        const button = event.target.closest("[data-view]");
        if (!button) return;
        state.view = button.dataset.view;
        document.querySelectorAll("[data-view]").forEach((item) => item.classList.toggle("is-active", item === button));
        els.previewWrap.classList.toggle("desktop-preview", state.view === "desktop");
      });
    </script>
  </body>
</html>
